<div class="menu" id="edit-contact">
    <h3>Редактирование чата</h3>
    <form id="editChatForm">

        <input type="text" id="editChatLink" placeholder="Ссылка (например, chat/123)" required>

        <div class="card-list flex" id="editUsersContainer"></div>

        <button type="submit">Сохранить</button>
    </form>
</div>
