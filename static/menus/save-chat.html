<div class="menu" id="save-chat">
    <h3>Сохранить чат</h3>
    <form id="saveChatForm">
        <input type="text" id="saveChatTitle" placeholder="Название чата" required>

        <input type="text" id="saveChatLink" placeholder="Ссылка (например, chat/123)" required>

        <div class="card-list flex" id="saveUsersContainer"></div>

        <div>
            <button type="button" id="saveAddUserBtn" class="iconoir-plus" title="Добавить пользователя"></button>
        </div>

        <button type="submit">Сохранить</button>
    </form>
</div>
