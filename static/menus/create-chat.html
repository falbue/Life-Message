<div class="menu">
    <h3>Создание чата</h3>
    <form id="chatForm">
        <input type="text" id="chatTitle" placeholder="Название чата" required>

        <input type="text" id="chatLink" placeholder="Ссылка (например, chat/123)" required>

        <div class="card-list flex " id="usersContainer"></div>

        <div>
            <button type="button" id="addUserBtn" class="iconoir-plus" title="Добавить пользователя"></button>
        </div>

        <button type="submit">Сохранить</button>
    </form>
</div>
