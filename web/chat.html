<!doctype html>
<html lang="ru">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Чат</title>
    <meta name="description"
        content="Анонимный чат в реальном времени. Общайтесь свободно, без истории переписки и идентификации!" />
    <meta name="keywords" content="chat, anonymous, chatroom" />
    <meta name="author" content="falbue" />
    <meta name="robots" content="nofollow, nofollow" />
    <link rel="manifest" href="static/manifest.json">

    <meta name="mobile-web-app-capable" content="yes" />

    <meta charset="UTF-8" />
    <link rel="icon" href="static/icons/favicon.svg" type="image/png" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css"
        media="(prefers-color-scheme: light)">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css"
        media="(prefers-color-scheme: dark)">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="cdn/css/main.css">
    <script src="cdn/js/main.js" type="module"></script>

    <link rel="stylesheet" type="text/css" href="static/css/chat.css" />
    <link rel="stylesheet" href="static/css/main.css">

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="static/scripts/chat/webrtc.js"></script>
    <script src="static/scripts/chat/users.js"></script>
    <script type="module" src="static/scripts/ui/auto-fonts.js"></script>
</head>

<body>
    <main>
        <header>
            <nav>
                <a href="/">
                    <i>
                        <h4 class="iconoir-arrow-left"></h4>
                    </i>
                </a>
                <nav id="users-list">
                    <h4 data-field="avatar"></h4>
                </nav>
                <nav>
                    <button class="iconoir-phone"></button>
                    <button class="iconoir-menu" menu="chat-menu"></button>
                </nav>
            </nav>
        </header>
        <div class="chat">
            <p id="displayMessage"></p>
        </div>

        <div id="textarea">
            <nav class="input-area">
                <textarea rows="1" placeholder="Сообщение" inputmode="text"></textarea>
                <button id="reset" class="ghost">
                    <i class="iconoir-xmark"></i>
                </button>
            </nav>
        </div>
    </main>
</body>

</html>
