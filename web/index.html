<!doctype html>
<html lang="ru">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta charset="UTF-8" />

    <title>Life Message</title>
    <meta name="description"
        content="Анонимный чат в реальном времени. Общайтесь свободно, без истории переписки и идентификации" />
    <meta name="keywords" content="chat, anonymous, chatroom" />
    <meta name="author" content="falbue" />
    <meta name="robots" content="index, nofollow" />
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="static/icons/favicon.svg" type="image/png" />

    <meta name="mobile-web-app-capable" content="yes" />

    <!-- сторонние подключения -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">

    <!-- Мои подключения -->
    <link rel="stylesheet" href="../cdn/css/main.css">
    <link rel="stylesheet" href="static/css/main.css">

    <script src="static/scripts/login-chat.js"></script>
    <script src="static/scripts/install-app.js" defer></script>

</head>

<body>
    <section>
        <div>
            <h1>Life Message</h1>
            <h2>Общение в реальном времени!</h2>
        </div>
        <form action="">
            <input type="text" placeholder="Введите ID чата" id="chat-id">
            <nav>
                <button id="install-app">
                    <h3 class="iconoir-download-square"></h3>
                </button>
                <button id="open-chat" type="submit">
                    <h3> Открыть чат</h3>
                </button>
                <a href="/contacts">
                    <h3 class="iconoir-community"></h3>
                </a>
            </nav>
        </form>
    </section>


    <footer id="custom">
        <a href="https://github.com/falbue/Life-Message" class="iconoir-github"><i>Github</i></a>
        <a href="https://iconoir.com/" class="iconoir-peace-hand"><i>iconoir</i></a>
    </footer>
</body>

</html>
