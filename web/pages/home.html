<head>
    <title>Life Message</title>

    <script src="static/scripts/login-chat.js"></script>
    <script src="static/scripts/install-app.js" defer></script>
</head>

<body>
    <header data-template="header"></header>
    <section>
        <div>
            <h1 class="adaptive">Life Message</h1>
            <h2 class="adaptive">Общение в реальном времени!</h2>
        </div>
        <form>
            <input type="text" placeholder="Введите ID чата" id="chat-id">
            <nav>
                <button id="install-app">
                    <h3 class="iconoir-download-square"></h3>
                </button>
                <button id="open-chat" type="submit">
                    <h3> Открыть чат</h3>
                </button>
                <a href="/contacts">
                    <h3 class="iconoir-community"></h3>
                </a>
            </nav>
        </form>
    </section>


    <footer id="custom">
        <a href="https://github.com/falbue/Life-Message" class="iconoir-github"><i>Github</i></a>
        <a href="https://iconoir.com/" class="iconoir-peace-hand"><i>iconoir</i></a>
    </footer>
</body>

</html>
